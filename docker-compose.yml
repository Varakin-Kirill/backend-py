services:
  postgres:
    image: postgres:16-alpine
    container_name: abzac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abzac}
      POSTGRES_USER: ${POSTGRES_USER:-abzac_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abzac_user} -d ${POSTGRES_DB:-abzac}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: abzac-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-abzac_user}:${POSTGRES_PASSWORD:-CHANGE_ME}@postgres:5432/${POSTGRES_DB:-abzac}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081}
      BOOKS_DIR: ${BOOKS_DIR:-demo-books}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./demo-books:/app/demo-books:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:


